name: Enrich AI Tools Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout enrichment repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-genai python-dotenv requests

      - name: Run enrichment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: QAInsights/awesome-ai-tools
          path: target-repo
          token: ${{ secrets.TARGET_REPO_PAT }}

      - name: Copy enriched data
        run: |
          mkdir -p target-repo/public/data
          cp enriched_data.json target-repo/public/data/

      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/enriched_data.json
          git diff --cached --quiet || git commit -m "chore: update enriched data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
